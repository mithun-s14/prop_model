name: Test Scrapers

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        cd backend
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Scrapling browsers
      run: scrapling install

    - name: Test usage rate scraper
      run: |
        cd backend
        python nba_usage_rate_scraper.py

    - name: Test defense scraper
      continue-on-error: true
      run: |
        cd backend
        python nba_defense_scraper.py

    - name: Test NBA data scraper
      run: |
        cd backend
        python nba_data_scraper.py
