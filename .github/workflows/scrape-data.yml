name: Daily NBA Scraper

on:
  schedule:
    # Run at 8 AM UTC every day
    - cron: '0 8 * * *'
  workflow_dispatch: # To allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        cd backend
        pip install -r requirements.txt
        
    - name: Run usage rate scraper
      run: |
        cd backend
        python nba_usage_rate_scraper.py
        
    - name: Run defense scraper
      run: |
        cd backend
        python nba_defense_scraper.py
        
    - name: Commit and push if changed
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add backend/*.pkl backend/*.csv
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update scraped data [automated]" && git push)
